<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Anggota - LensaAlam (Versi Lokal)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .tab-active { border-bottom: 2px solid #059669; color: #059669; }
        
        .photo-grid-item {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
        }
        .photo-grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s;
        }
        .btn-disabled {
            background-color: #e5e7eb !important;
            color: #9ca3af !important;
            cursor: not-allowed !important;
            pointer-events: none;
        }
        .photo-like-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(255, 255, 255, 0.9);
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }
        .heart-active {
            color: #ef4444 !important;
            fill: currentColor !important;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- Loader -->
    <div id="loader" class="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-emerald-600"></div>
    </div>

    <!-- Navigasi -->
    <nav class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <span class="text-2xl font-bold bg-gradient-to-r from-emerald-600 to-teal-500 bg-clip-text text-transparent">LensaAlam</span>
                <div class="hidden md:flex space-x-8 font-medium text-xs uppercase tracking-widest items-center">
                    <a href="index.html" class="text-gray-600 hover:text-emerald-600 transition">Beranda</a>
                    <a href="Galeri.html" class="text-gray-600 hover:text-emerald-600 transition">Galeri</a>
                    <a href="Tentang.html" class="text-gray-600 hover:text-emerald-600 transition">Tentang</a>
                    <a href="Profil.html" class="text-emerald-600 border-b-2 border-emerald-600 pb-1">Profil</a>
                    <a href="Kontak.html" class="text-gray-600 hover:text-emerald-600 transition">Kontak</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Tab Pemilih -->
    <div class="bg-white border-b sticky top-16 z-40">
        <div class="max-w-5xl mx-auto px-4 flex justify-center space-x-8">
            <button onclick="handleTabClick('jovan')" id="tab-jovan" class="py-4 text-sm font-bold uppercase tracking-widest transition-all">Jovan</button>
            <button onclick="handleTabClick('ahmat')" id="tab-ahmat" class="py-4 text-sm font-bold uppercase tracking-widest transition-all">Ahmat</button>
            <button onclick="handleTabClick('nur')" id="tab-nur" class="py-4 text-sm font-bold uppercase tracking-widest transition-all">Nur</button>
        </div>
    </div>

    <div id="profile-content" class="animate-fade-in"></div>

    <footer class="py-12 text-center text-gray-400 text-sm border-t mt-12">
        <p>&copy; 2024 Kolaborasi LensaAlam. Versi Luring (Stand-alone).</p>
    </footer>

    <script>
        // DATA STATIS (Tidak butuh database)
        const profileStaticData = {
            jovan: {
                name: "Jovan",
                avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Jovan",
                role: "Landscape Architect",
                bio: "Menjelajahi sisi liar dunia melalui lensa. Kolektor momen matahari terbit. 🏔️📸",
                photos: [
                    "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b", 
                    "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05", 
                    "https://images.unsplash.com/photo-1501785888041-af3ef285b470"
                ]
            },
            ahmat: {
                name: "Ahmat",
                avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Ahmat",
                role: "Marine Visionary",
                bio: "Pengejar ombak dan senja di ufuk barat. Keindahan laut adalah simfoni. 🌊🌅",
                photos: [
                    "https://images.unsplash.com/photo-1507525428034-b723cf961d3e", 
                    "https://images.unsplash.com/photo-1519046904884-53103b34b206", 
                    "https://images.unsplash.com/photo-1505118380757-91f5f45f8de4"
                ]
            },
            nur: {
                name: "Nur",
                avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Nur",
                role: "Forestry Specialist",
                bio: "Menemukan keajaiban dalam detail terkecil hutan. Pecinta tekstur lumut. 🌲🍄",
                photos: [
                    "https://images.unsplash.com/photo-1441974231531-c6227db76b6e", 
                    "https://images.unsplash.com/photo-1511497584788-876760111969", 
                    "https://images.unsplash.com/photo-1448375240586-882707db888b"
                ]
            }
        };

        // FUNGSI UTAMA
        let currentUserId = 'jovan';

        function checkStatus(key) {
            return localStorage.getItem('lensaalam_' + key) === 'true';
        }

        function toggleStatus(key) {
            localStorage.setItem('lensaalam_' + key, 'true');
        }

        function render() {
            const user = profileStaticData[currentUserId];
            const content = document.getElementById('profile-content');
            
            // Update Tab UI
            ['jovan', 'ahmat', 'nur'].forEach(id => {
                const btn = document.getElementById('tab-' + id);
                btn.className = `py-4 text-sm font-bold uppercase tracking-widest transition-all ${id === currentUserId ? 'tab-active' : 'text-gray-400 hover:text-emerald-500'}`;
            });

            const isFollowed = checkStatus(currentUserId + '_follow');
            const followers = isFollowed ? 125 : 124; // Angka simulasi

            content.innerHTML = `
                <header class="bg-white border-b">
                    <div class="max-w-5xl mx-auto px-4 py-12">
                        <div class="flex flex-col md:flex-row items-center md:items-start gap-8">
                            <div class="w-32 h-32 md:w-40 md:h-40 rounded-full bg-emerald-500 p-1">
                                <img src="${user.avatar}" class="w-full h-full rounded-full bg-white object-cover">
                            </div>
                            <div class="flex-1 text-center md:text-left">
                                <div class="flex flex-col md:flex-row md:items-center gap-4 mb-4">
                                    <h1 class="text-3xl font-bold text-gray-800">${user.name}</h1>
                                    <button onclick="handleFollow()" 
                                        class="${isFollowed ? 'btn-disabled' : 'bg-emerald-600 hover:bg-emerald-700 text-white'} px-8 py-2 rounded-lg text-sm font-semibold transition">
                                        ${isFollowed ? 'Mengikuti' : 'Ikuti Penulis'}
                                    </button>
                                </div>
                                <div class="flex justify-center md:justify-start gap-10 mb-6 text-gray-800">
                                    <div><span class="block font-bold text-2xl">${user.photos.length}</span><span class="text-gray-500 text-xs uppercase">Kiriman</span></div>
                                    <div><span class="block font-bold text-2xl">${followers}</span><span class="text-gray-500 text-xs uppercase">Pengikut</span></div>
                                </div>
                                <div>
                                    <p class="font-bold text-emerald-700 text-sm mb-1">${user.role}</p>
                                    <p class="text-gray-600 text-sm max-w-md">${user.bio}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </header>
                <main class="max-w-5xl mx-auto px-4 py-10">
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                        ${user.photos.map((url, i) => {
                            const isLiked = checkStatus(currentUserId + '_like_' + i);
                            return `
                            <div class="photo-grid-item rounded-xl border group">
                                <img src="${url}?auto=format&fit=crop&q=80&w=600">
                                <button onclick="handleLike(${i})" class="absolute top-3 right-3 p-2 rounded-full bg-white/90 ${isLiked ? 'heart-active' : 'text-gray-300'}">
                                    <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                                </button>
                                <div class="photo-like-badge">❤️ <span>${isLiked ? 1 : 0} suka</span></div>
                            </div>
                            `;
                        }).join('')}
                    </div>
                </main>
            `;
        }

        // HANDLERS
        window.handleTabClick = (id) => {
            currentUserId = id;
            render();
        };

        window.handleFollow = () => {
            toggleStatus(currentUserId + '_follow');
            render();
        };

        window.handleLike = (index) => {
            toggleStatus(currentUserId + '_like_' + index);
            render();
        };

        // Jalankan saat siap
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                render();
            }, 800);
        };
    </script>
</body>
</html>
